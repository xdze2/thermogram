[project]
name = "thermogram"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "numpy>=1.26",
    "scipy>=1.13",
    "pandas>=2.2",
    "influxdb>=5.3",
]

[dependency-groups]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["thermogram"]

[tool.pytest.ini_options]
markers = [
    "roundtrip: synthetic round-trip recovery tests (may be slow)",
]

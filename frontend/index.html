<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermal nodes</title>
  <link href="/vendor/daisyui.css" rel="stylesheet" />
  <script src="/vendor/tailwindcss-browser.js"></script>
  <style>
    body { font-family: ui-monospace, "Cascadia Code", monospace; }
    #app { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 41px); }
    #editor { overflow-y: auto; }
    #priors { overflow-y: auto; }
    .element-card-body { display: none; }
    .element-card-body.open { display: block; }
    .contrib-bar-wrap { height: 6px; border-radius: 2px; overflow: hidden; background: oklch(var(--b3)); }
    .contrib-bar { height: 100%; background: oklch(var(--p)); border-radius: 2px; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-base-100 text-base-content min-h-screen">

  <div class="bg-base-200 border-b border-base-300 py-2 px-4 flex items-center justify-between">
    <span class="text-xs tracking-widest uppercase text-base-content/50">thermal nodes</span>
    <div class="flex items-center gap-3">
      <a href="/docs" target="_blank" class="text-xs text-base-content/40 hover:text-base-content/80 transition-colors">API docs</a>
      <div class="relative">
        <button id="theme-btn" class="text-xs text-base-content/40 hover:text-base-content/80 transition-colors">theme</button>
        <div id="theme-menu" class="hidden absolute right-0 top-6 z-50 bg-base-200 border border-base-300 rounded shadow-lg py-1 min-w-28">
          <button class="theme-option block w-full text-left px-3 py-1 text-xs hover:bg-base-300" data-theme="dark">dark</button>
          <button class="theme-option block w-full text-left px-3 py-1 text-xs hover:bg-base-300" data-theme="light">light</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const themeBtn = document.getElementById('theme-btn');
    const themeMenu = document.getElementById('theme-menu');
    themeBtn.addEventListener('click', () => themeMenu.classList.toggle('hidden'));
    document.addEventListener('click', e => {
      if (!themeBtn.contains(e.target) && !themeMenu.contains(e.target)) themeMenu.classList.add('hidden');
    });
    document.querySelectorAll('.theme-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.documentElement.setAttribute('data-theme', btn.dataset.theme);
        localStorage.setItem('theme', btn.dataset.theme);
        themeMenu.classList.add('hidden');
      });
    });
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>

  <div id="app">

    <!-- ── Left: room editor ── -->
    <div id="editor" class="border-r border-base-300 p-3 flex flex-col gap-4">

      <!-- Room fields -->
      <div>
        <p class="text-xs uppercase tracking-widest text-base-content/30 mb-2">Room</p>
        <div class="flex flex-col gap-1">
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">Name</span>
            <input id="room-name" type="text" value="My room"
                   class="input input-xs input-bordered w-full" />
          </label>
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">Floor area (m²)</span>
            <input id="room-floor" type="number" value="20"
                   class="input input-xs input-bordered w-full" />
          </label>
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">Height (m)</span>
            <input id="room-height" type="number" value="2.5"
                   class="input input-xs input-bordered w-full" />
          </label>
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">ACH (h⁻¹)</span>
            <input id="room-ach" type="number" value="0.5"
                   class="input input-xs input-bordered w-full" />
          </label>
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">Latitude</span>
            <input id="room-lat" type="number" value="48.85"
                   class="input input-xs input-bordered w-full" />
          </label>
          <label class="flex items-center gap-2">
            <span class="text-xs text-base-content/50 w-28 shrink-0">Longitude</span>
            <input id="room-lon" type="number" value="2.35"
                   class="input input-xs input-bordered w-full" />
          </label>
        </div>
      </div>

      <div class="divider my-0"></div>

      <!-- Envelope elements -->
      <div class="flex flex-col gap-2">
        <p class="text-xs uppercase tracking-widest text-base-content/30">Envelope elements</p>
        <div id="elements-list" class="flex flex-col gap-2"></div>
        <button id="add-element-btn" class="btn btn-xs btn-outline w-fit">+ add element</button>
      </div>

    </div>

    <!-- ── Right: priors display ── -->
    <div id="priors" class="p-4">
      <p class="text-xs uppercase tracking-widest text-base-content/30 mb-3">RC model priors</p>
      <div id="status" class="text-xs text-base-content/30 mb-2"></div>
      <div id="priors-content" class="flex flex-col gap-5"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
